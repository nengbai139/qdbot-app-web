name: qdbot_app_example
description: QDBot App Flutter integration example
version: 1.0.0
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  web_socket_channel: ^2.4.0
  flutter_markdown: ^0.7.1
  markdown: ^7.3.1
  google_fonts: ^8.1.0
  http: ^1.1.0
  flutter_secure_storage: ^9.2.4
  file_picker: ^8.1.2
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  share_plus: ^12.0.2
  url_launcher: ^6.3.1
  web: ^1.1.1
  qr_flutter: ^4.1.0
  record: ^5.1.2
  audioplayers: ^6.1.0
  video_player: ^2.9.2
  flutter_webrtc: ^1.4.0
  dart_webrtc: ^1.8.1
  livekit_client: ^2.8.1
  connectivity_plus: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - google_fonts/
