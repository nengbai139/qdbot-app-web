<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="QDBot App - IM + AI Assistant">

  <!-- 系统字体优先，在线时可加载 Noto；离线仍可读中文 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet"></noscript>

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="QDBot App">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>QDBot App</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    }
    /* iOS Safari 文本输入修复 */
    input, textarea, [contenteditable], flt-text-editing-host, .flt-text-editing {
      -webkit-user-select: text !important;
      user-select: text !important;
      -webkit-touch-callout: default !important;
      touch-action: manipulation;
    }
    flt-glass-pane {
      pointer-events: auto !important;
    }
  </style>
  <script>
    // ponytail: 清除旧 PWA Service Worker，避免 Safari 反复整页 reload
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        for (var i = 0; i < regs.length; i++) regs[i].unregister();
      });
    }
  </script>
  <script src="qdbot_virtual_bg.js" defer></script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    // 可靠的剪贴板复制（兼容所有浏览器）
    window._qdbotCopy = function(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text).catch(function() {
          return _fallbackCopy(text);
        });
      }
      return _fallbackCopy(text);
    };
    function _fallbackCopy(text) {
      return new Promise(function(resolve, reject) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        ta.style.top = '-9999px';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
          var ok = document.execCommand('copy');
          document.body.removeChild(ta);
          ok ? resolve() : reject(new Error('execCommand failed'));
        } catch(e) {
          document.body.removeChild(ta);
          reject(e);
        }
      });
    }
    window.qdbotDetachLiveHls = function(video) {
      if (video && video._qdbotHlsCleanup) {
        video._qdbotHlsCleanup();
        video._qdbotHlsCleanup = null;
      }
    };
    window.qdbotUnmuteAllLiveVideos = function() {
      var n = 0;
      document.querySelectorAll('video[data-qdbot-live="1"]').forEach(function(v) {
        v.muted = false;
        v.volume = 1;
        delete v.dataset.qdbotNeedUnmute;
        v.play().catch(function() {});
        n++;
      });
      return n > 0;
    };
    window.qdbotLiveAudioNeedsUnmute = function() {
      return !!document.querySelector('video[data-qdbot-need-unmute="1"]');
    };
    // 直播 HLS：仅在 pushActive 后由 Flutter 挂载；404 时静默重试，不刷控制台
    window.qdbotAttachLiveHls = function(video, url) {
      if (!video || !url) return;
      video.dataset.qdbotLive = '1';
      video.style.objectFit = 'cover';
      video.addEventListener('click', function() {
        if (video.muted || video.dataset.qdbotNeedUnmute === '1') {
          video.muted = false;
          video.volume = 1;
          delete video.dataset.qdbotNeedUnmute;
          video.play().catch(function() {});
        }
      });
      video.style.backgroundColor = 'transparent';
      function tryPlay() {
        var p = video.play();
        if (p && p.catch) {
          p.catch(function() {
            video.muted = true;
            video.dataset.qdbotNeedUnmute = '1';
            video.play().catch(function() {});
          });
        }
      }
      if (video._qdbotHlsCleanup) {
        video._qdbotHlsCleanup();
        video._qdbotHlsCleanup = null;
      }
      var retryMs = 1000;
      var stopped = false;
      function stop() {
        stopped = true;
        if (video._qdbotHlsCleanup) {
          video._qdbotHlsCleanup();
          video._qdbotHlsCleanup = null;
        }
        video.removeAttribute('src');
        try { video.load(); } catch (e) {}
      }
      function attachNative() {
        var timer = null;
        function load() {
          if (stopped) return;
          video.src = url + (url.indexOf('?') >= 0 ? '&' : '?') + '_t=' + Date.now();
          tryPlay();
        }
        function schedule() {
          if (stopped) return;
          clearTimeout(timer);
          timer = setTimeout(load, retryMs);
        }
        video.addEventListener('error', schedule);
        load();
        video._qdbotHlsCleanup = function() {
          stopped = true;
          clearTimeout(timer);
          video.removeEventListener('error', schedule);
        };
      }
      function attachHls() {
        if (!(window.Hls && Hls.isSupported())) {
          attachNative();
          return;
        }
        var hls = new Hls({
          lowLatencyMode: true,
          liveSyncDurationCount: 2,
          manifestLoadingMaxRetry: 120,
          manifestLoadingRetryDelay: retryMs,
          levelLoadingMaxRetry: 12,
          fragLoadingMaxRetry: 12,
          debug: false,
        });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, function() { tryPlay(); });
        var recoverTimer = null;
        function scheduleRecover() {
          if (stopped) return;
          clearTimeout(recoverTimer);
          recoverTimer = setTimeout(function() {
            if (!stopped) {
              try { hls.startLoad(); } catch (e) {}
              tryPlay();
            }
          }, retryMs);
        }
        hls.on(Hls.Events.ERROR, function(_, data) {
          if (stopped || !data.fatal) return;
          if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
            scheduleRecover();
          } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
            hls.recoverMediaError();
            scheduleRecover();
          }
        });
        video.addEventListener('waiting', scheduleRecover);
        video.addEventListener('stalled', scheduleRecover);
        video._qdbotHlsCleanup = function() {
          stopped = true;
          clearTimeout(recoverTimer);
          video.removeEventListener('waiting', scheduleRecover);
          video.removeEventListener('stalled', scheduleRecover);
          stop();
        };
      }
      function boot() {
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          attachNative();
        } else {
          attachHls();
        }
      }
      if (window.Hls) { boot(); return; }
      var s = document.getElementById('qdbot-hlsjs');
      if (!s) {
        s = document.createElement('script');
        s.id = 'qdbot-hlsjs';
        s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js';
        s.async = true;
        s.onload = boot;
        s.onerror = function() { attachNative(); };
        document.head.appendChild(s);
      } else if (window.Hls) {
        boot();
      } else {
        s.addEventListener('load', boot, { once: true });
      }
    };
    // 网页 WHIP 推流（SRS rtc/v1/whip）+ 可选虚拟背景
    window._qdbotWhipState = { pc: null, stream: null, rawStream: null, resource: null, screenMode: false, backdropUrl: '', vbgStop: null };
    window.qdbotWhipCleanupMedia = function(s) {
      if (!s) return;
      if (s.vbgStop) {
        try { s.vbgStop(); } catch (e) {}
        s.vbgStop = null;
      }
      if (s.rawStream) {
        s.rawStream.getTracks().forEach(function(t) { t.stop(); });
        s.rawStream = null;
      }
      if (s.stream) {
        s.stream.getTracks().forEach(function(t) {
          if (t.kind === 'video' && t.readyState === 'live') {
            try { t.stop(); } catch (e) {}
          }
        });
      }
    };
    window.qdbotWhipPublishing = function() {
      return !!(window._qdbotWhipState && window._qdbotWhipState.pc);
    };
    window.qdbotWhipStop = function() {
      var s = window._qdbotWhipState;
      if (!s) return;
      if (s.resource) {
        fetch(s.resource, { method: 'DELETE' }).catch(function() {});
      }
      window.qdbotWhipCleanupMedia(s);
      if (s.pc) {
        try { s.pc.close(); } catch (e) {}
      }
      window._qdbotWhipState = { pc: null, stream: null, rawStream: null, resource: null, screenMode: false, backdropUrl: '', vbgStop: null };
      var preview = document.getElementById('qdbot-whip-preview');
      if (preview) preview.srcObject = null;
    };
    window.qdbotWhipAttachPreview = function() {
      var s = window._qdbotWhipState;
      if (!s || !s.stream) return false;
      var preview = document.getElementById('qdbot-whip-preview');
      if (!preview) return false;
      preview.srcObject = s.stream;
      preview.muted = true;
      preview.playsInline = true;
      preview.play().catch(function() {});
      return true;
    };

    window.qdbotWhipAddPublishTracks = function(pc, rawStream, publishStream, wantAudio, wantVideo) {
      if (wantVideo) {
        var vt = publishStream.getVideoTracks()[0];
        if (vt) pc.addTrack(vt, publishStream);
      }
      if (wantAudio) {
        var at = rawStream.getAudioTracks()[0];
        if (at) pc.addTrack(at, rawStream);
      }
    };
    window.qdbotWhipBuildCameraPublish = async function(rawStream, backdropUrl) {
      var wrap = window.qdbotWrapVirtualBg || null;
      if (!wrap || !(backdropUrl || '').trim()) {
        return { stream: rawStream, vbgStop: function() {} };
      }
      var r = await wrap(rawStream, backdropUrl);
      return { stream: r.stream, vbgStop: r.stop };
    };
    window.qdbotWhipPublish = async function(whipUrl, wantAudio, wantVideo, backdropUrl) {
      window.qdbotWhipStop();
      if (wantAudio === undefined || wantAudio === null) wantAudio = true;
      if (wantVideo === undefined || wantVideo === null) wantVideo = true;
      if (!wantAudio && !wantVideo) return '请至少开启麦克风或摄像头';
      if (!whipUrl) return '缺少 WHIP 地址';
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        return '当前浏览器不支持摄像头/麦克风';
      }
      if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        return '网页推流需要 HTTPS（请用 https://www.aimatchem.com）';
      }
      backdropUrl = (backdropUrl || '').trim();
      try {
        var pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
          bundlePolicy: 'max-bundle',
        });
        pc.addTransceiver('audio', { direction: 'sendonly' });
        pc.addTransceiver('video', { direction: 'sendonly' });
        var constraints = {};
        if (wantAudio) constraints.audio = { echoCancellation: true, noiseSuppression: true, autoGainControl: true };
        if (wantVideo) {
          constraints.video = { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } };
        }
        var rawStream = await navigator.mediaDevices.getUserMedia(constraints);
        var vbgStop = function() {};
        var publishStream = rawStream;
        if (wantVideo && backdropUrl) {
          var built = await window.qdbotWhipBuildCameraPublish(rawStream, backdropUrl);
          publishStream = built.stream;
          vbgStop = built.vbgStop;
        }
        window.qdbotWhipAddPublishTracks(pc, rawStream, publishStream, wantAudio, wantVideo);
        pc.onconnectionstatechange = function() {
          if (!window._qdbotWhipState) return;
          window._qdbotWhipState.conn = pc.connectionState;
        };
        var offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        var resp = await fetch(whipUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/sdp' },
          body: offer.sdp,
        });
        if (resp.status !== 200 && resp.status !== 201) {
          window.qdbotWhipCleanupMedia({ rawStream: rawStream, stream: publishStream, vbgStop: vbgStop });
          pc.close();
          var errBody = '';
          try { errBody = await resp.text(); } catch (e) {}
          return 'WHIP 推流失败 HTTP ' + resp.status + (errBody ? ': ' + errBody.slice(0, 120) : '');
        }
        var answer = await resp.text();
        await pc.setRemoteDescription({ type: 'answer', sdp: answer });
        var loc = resp.headers.get('Location') || resp.headers.get('location');
        window._qdbotWhipState = {
          pc: pc,
          stream: publishStream,
          rawStream: rawStream,
          resource: loc,
          screenMode: false,
          backdropUrl: backdropUrl,
          vbgStop: vbgStop,
        };
        window.qdbotWhipAttachPreview();
        return null;
      } catch (e) {
        window.qdbotWhipStop();
        return (e && e.message) ? e.message : String(e);
      }
    };
    window.qdbotWhipScreenSharing = function() {
      var s = window._qdbotWhipState;
      return !!(s && s.screenMode);
    };
    window.qdbotWhipSwitchVideo = async function(mode) {
      var s = window._qdbotWhipState;
      if (!s || !s.pc || !s.stream) return '请先开启摄像头推流';
      if (!navigator.mediaDevices) return '浏览器不支持';
      try {
        var sender = null;
        s.pc.getSenders().forEach(function(x) {
          if (x.track && x.track.kind === 'video') sender = x;
        });
        if (!sender) return '推流未就绪';
        var oldVideo = s.stream.getVideoTracks()[0];
        if (mode === 'screen') {
          if (s.vbgStop) { s.vbgStop(); s.vbgStop = null; }
          var displayStream = await navigator.mediaDevices.getDisplayMedia({
            video: { frameRate: { ideal: 15, max: 30 } },
            audio: false,
          });
          var newVideoTrack = displayStream.getVideoTracks()[0];
          if (!newVideoTrack) return '无法获取屏幕';
          await sender.replaceTrack(newVideoTrack);
          if (oldVideo) { oldVideo.stop(); try { s.stream.removeTrack(oldVideo); } catch (e) {} }
          s.stream.addTrack(newVideoTrack);
          newVideoTrack.onended = function() {
            if (window._qdbotWhipState && window._qdbotWhipState.screenMode) {
              window.qdbotWhipSwitchVideo('camera').catch(function() {});
            }
          };
          s.screenMode = true;
        } else {
          var camStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: false,
          });
          if (s.rawStream) {
            s.rawStream.getVideoTracks().forEach(function(t) { t.stop(); });
            var newRaw = camStream.getVideoTracks()[0];
            if (newRaw) s.rawStream.addTrack(newRaw);
          } else {
            s.rawStream = camStream;
          }
          camStream.getTracks().forEach(function(t) {
            if (t.kind === 'video' && t !== s.rawStream.getVideoTracks()[0]) t.stop();
          });
          if (s.vbgStop) { s.vbgStop(); s.vbgStop = null; }
          var built = await window.qdbotWhipBuildCameraPublish(s.rawStream, s.backdropUrl || '');
          s.stream = built.stream;
          s.vbgStop = built.vbgStop;
          var pubVideo = s.stream.getVideoTracks()[0];
          if (!pubVideo) return '无法合成视频';
          await sender.replaceTrack(pubVideo);
          if (oldVideo && oldVideo !== pubVideo) { oldVideo.stop(); }
          s.screenMode = false;
        }
        window.qdbotWhipAttachPreview();
        return null;
      } catch (e) {
        if (e && e.name === 'NotAllowedError') return '已取消屏幕共享';
        return (e && e.message) ? e.message : String(e);
      }
    };
    // 会议实时字幕（Web Speech API → Flutter 轮询队列）
    window._qdbotCaptionQueue = [];
    window._qdbotCaptionRec = null;
    window.qdbotMeetingCaptionDrain = function() {
      var q = window._qdbotCaptionQueue;
      window._qdbotCaptionQueue = [];
      return JSON.stringify(q);
    };
    window.qdbotMeetingCaptionStop = function() {
      var rec = window._qdbotCaptionRec;
      window._qdbotCaptionRec = null;
      if (rec) {
        try { rec.onend = null; rec.stop(); } catch (e) {}
      }
    };
    window.qdbotMeetingCaptionStart = function(lang) {
      window.qdbotMeetingCaptionStop();
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) return '当前浏览器不支持语音识别（请用 Chrome / Edge）';
      if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
        return '语音识别需要 HTTPS';
      }
      try {
        var rec = new SR();
        rec.lang = lang || 'zh-CN';
        rec.continuous = true;
        rec.interimResults = true;
        rec.onresult = function(e) {
          for (var i = e.resultIndex; i < e.results.length; i++) {
            var t = (e.results[i][0] && e.results[i][0].transcript) ? e.results[i][0].transcript.trim() : '';
            if (!t) continue;
            window._qdbotCaptionQueue.push({ text: t, final: !!e.results[i].isFinal });
          }
        };
        rec.onerror = function(e) {
          if (e && e.error === 'not-allowed') {
            window._qdbotCaptionQueue.push({ text: '', final: true, error: 'mic_denied' });
          }
        };
        rec.onend = function() {
          if (window._qdbotCaptionRec === rec) {
            try { rec.start(); } catch (e) {}
          }
        };
        rec.start();
        window._qdbotCaptionRec = rec;
        return null;
      } catch (e) {
        return (e && e.message) ? e.message : String(e);
      }
    };
  </script>
  <script src="flutter_bootstrap.js?v=1782703431803311" async></script>
</body>
